spring:
  datasource:
    url: jdbc:h2:mem:robot_management;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true

robot:
  telemetry:
    required-source: ros2-gazebo
  redis:
    host: 127.0.0.1
    port: 6399
    alert-stream: robot:alerts
    state-stream: robot:states
